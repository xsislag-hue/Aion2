<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION 2 Management - Dynamic Rows</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #6b7280; --bg: #f8f9fa; --border: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .view-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; background: #e5e7eb; color: var(--secondary); font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f3f4; padding: 12px; border: 1px solid var(--border); font-size: 14px; text-align: left; }
        td { border: 1px solid var(--border); }
        .input-cell, .select-cell { width: 100%; padding: 12px; border: none; outline: none; font-size: 14px; box-sizing: border-box; background: transparent; }
        .input-cell:focus { background: #f0f7ff; }
        .pagination { display: flex; justify-content: center; gap: 15px; margin-top: 25px; align-items: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; background: var(--primary); color: white; cursor: pointer; font-weight: 500; }
        .btn-add { background: #16a34a; margin-top: 15px; }
        .btn-delete { background: #dc2626; color: white; padding: 5px 10px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
        .save-status { text-align: center; font-size: 13px; color: #16a34a; margin-top: 15px; height: 15px; }
        .view-content { display: none; }
        .view-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">ID: <span id="currentPageDisplay">1</span></div>
        <div id="clock" style="color: #666; font-family: monospace;"></div>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" onclick="switchView('char')">👥 ตัวละคร</button>
        <button class="tab-btn" onclick="switchView('item')">🎒 ไอเทม</button>
    </div>

    <div id="charView" class="view-content active">
        <table id="charTable">
            <thead>
                <tr>
                    <th style="width: 30%;">ชื่อตัวละคร</th>
                    <th style="width: 30%;">อาชีพ</th>
                    <th style="width: 20%;">Energy ⚡</th>
                    <th style="width: 10%;">ลบ</th>
                </tr>
            </thead>
            <tbody id="charTableBody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addNewCharRow()">➕ เพิ่มแถวตัวละคร</button>
    </div>

    <div id="itemView" class="view-content">
        <table id="itemTable">
            <thead>
                <tr>
                    <th style="width: 30%;">ชื่อไอเทม</th>
                    <th style="width: 30%;">จำนวน (เทรดได้)</th>
                    <th style="width: 30%;">จำนวน (เทรดไม่ได้)</th>
                    <th style="width: 10%;">ลบ</th>
                </tr>
            </thead>
            <tbody id="itemTableBody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addNewItemRow()">➕ เพิ่มรายการไอเทม</button>
    </div>

    <div class="save-status" id="status"></div>

    <div class="pagination">
        <button class="btn" id="prevBtn" onclick="changePage(-1)">← หน้าก่อนหน้า</button>
        <b id="pageNumber">หน้า 1</b>
        <button class="btn" id="nextBtn" onclick="changePage(1)">หน้าถัดไป →</button>
    </div>
</div>

<script>

    const classes = ["Ranger", "Gladiator", "Templar", "Assassin", "Sorcerer", "Spiritmaster", "Cleric", "Chanter"];

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        event.currentTarget.classList.add('active');
