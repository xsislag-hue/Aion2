<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION 2 Tracker - Fixed Energy Logic</title>
    <style>
        :root { --primary: #1a73e8; --success: #16a34a; --danger: #dc2626; --gold: #f59e0b; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .container { background: white; width: 100%; max-width: 1350px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .money-display { background: linear-gradient(135deg, #fffbeb, #fef3c7); padding: 15px; border-radius: 10px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .money-input { border: none; background: transparent; font-size: 32px; font-weight: bold; color: #d97706; width: 160px; text-align: center; outline: none; border-bottom: 2px dashed #f59e0b; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: #e5e7eb; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; }
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; }
        th { background: #f1f3f4; padding: 10px 2px; border: 1px solid #ddd; font-size: 11px; text-align: center; }
        td { border: 1px solid #ddd; padding: 0; }
        .col-name { width: 11%; } .col-job { width: 8%; } .col-ene-input { width: 11%; }
        .col-ene-curr { width: 9%; } .col-rounds { width: 8%; } .col-buy { width: 9%; } 
        .col-craft { width: 9%; } .col-asc { width: 8%; } .col-raid { width: 8%; } 
        .col-extra { width: 8%; } .col-del { width: 35px; }
        .input-cell { width: 100%; padding: 10px 5px; border: none; outline: none; box-sizing: border-box; background: transparent; font-size: 11px; text-align: center; cursor: pointer; }
        .readonly-cell { background: #f0f4ff; color: #1a73e8; font-weight: bold; cursor: default; }
        .round-cell { background: #fff7ed; color: #ea580c; font-weight: bold; }
        .status-done { color: white !important; font-weight: bold; background: var(--success) !important; }
        .status-not { color: white !important; background: var(--danger) !important; }
        .status-off { color: #ccc; background: #f9fafb !important; cursor: not-allowed; }
        .section-title { font-size: 18px; font-weight: bold; color: var(--primary); margin: 15px 0 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; }
        .btn-blue { background: var(--primary); }
        .btn-add { background: var(--success); }
        .btn-reset { background: #4b5563; margin-left: 10px; }
        .btn-del-tiny { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; border-radius: 4px; cursor: pointer; font-size: 9px; padding: 2px 5px; font-weight: bold; }
        .status-msg { text-align: center; color: var(--success); font-size: 12px; height: 18px; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        .vip-timer-display { background: #111827; color: #10b981; padding: 15px; border-radius: 8px; text-align: center; margin-top: 5px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .timer-val { font-family: 'Courier New', monospace; font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        .expire-label { font-size: 13px; color: #fbbf24; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 20px; font-weight: bold; color: var(--primary);">
            ID: <span id="idLabel">1</span> 
            <input type="text" id="idNote" style="border:none; border-bottom:1px solid #ccc; font-size:16px; width:150px; outline:none;" placeholder="ชื่อโน้ต..." oninput="queueSave()">
        </div>
        <div id="clock" style="font-family: monospace; color: #666; font-size: 16px;"></div>
    </div>

    <div class="money-display">
        <div style="font-weight:bold; color:#b45309">เงิน M:</div>
        <input type="number" id="moneyM" class="money-input" placeholder="0" oninput="queueSave()">
        <div style="font-weight:bold; color:#b45309">M</div>
    </div>

    <div class="tab-bar">
        <button id="tabChar" class="tab active" onclick="changeTab('char')">👥 ตัวละคร</button>
        <button id="tabItem" class="tab" onclick="changeTab('item')">🎒 คลังไอเทม</button>
    </div>

    <div id="charView" class="content active">
        <div class="vip-card" style="background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 20px;">
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 10px; justify-content: center;">
                <span style="font-weight:bold;">ตั้งค่า VIP:</span>
                <input type="number" id="vipDays" placeholder="วัน" style="width:60px; text-align:center; padding:5px; border-radius:4px; border:1px solid #ccc;" oninput="startVipCountdown()"> <span>วัน</span>
                <input type="number" id="vipHours" placeholder="ชม." style="width:60px; text-align:center; padding:5px; border-radius:4px; border:1px solid #ccc;" oninput="startVipCountdown()"> <span>ชั่วโมง</span>
            </div>
            <div class="vip-timer-display">
                <div class="timer-val" id="countdownLabel">00 วัน 00:00:00</div>
                <div class="expire-label" id="expireDateLabel">ยังไม่ได้ตั้งค่าวันหมดอายุ</div>
            </div>
        </div>

        <div class="section-title">
            <span>📋 รายการตัวละคร <span class="reset-info">(รีเซ็ตทุกพุธ 09:00)</span></span>
            <div>
                <button class="btn btn-reset" onclick="manualWeeklyReset()">ล้างข้อมูลสัปดาห์นี้</button>
                <button class="btn btn-blue" onclick="addNewColumn()">+ ช่องพิเศษ</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-name">ชื่อตัวละคร</th>
                        <th class="col-job">อาชีพ</th>
                        <th class="col-ene-input">Energy คงเหลือ</th>
                        <th class="col-ene-curr">Energy ปัจจุบัน</th>
                        <th class="col-rounds">รอบลงดัน</th>
                        <th class="col-buy">ซื้อ Energy</th>
                        <th class="col-craft">คราฟ Energy</th>
                        <th class="col-asc">Ascension</th>
                        <th class="col-raid">Raid</th>
                        <tbody id="extraHead"></tbody>
                        <th class="col-del"></th>
                    </tr>
                </thead>
                <tbody id="charBody"></tbody>
            </table>
        </div>
        <button class="btn btn-add" onclick="addCharRow()">+ เพิ่มตัวละคร</button>
    </div>

    <div id="itemView" class="content">
         <div class="section-title"><span>🎒 คลังไอเทม</span></div>
        <tbody id="itemBody"></tbody>
        </div>

    <div id="saveText" class="status-msg"></div>
    <div style="text-align:center; margin-top:15px;">
        <button class="btn btn-blue" onclick="changeID(-1)">←</button>
        <span id="pageText" style="margin:0 15px; font-weight:bold;">หน้า 1</span>
        <button class="btn btn-blue" onclick="changeID(1)">→</button>
    </div>
</div>

<script>
    let currentID = 1;
    const CLASSES = ["Ranger", "Gladiator", "Templar", "Assassin", "Sorcerer", "Spiritmaster", "Cleric", "Chanter"];
    const MILESTONES = [1, 4, 7, 10, 13, 16, 19, 22];
    let extraCols = [];
    let vipInterval;

    // --- Time & VIP ---
    function formatThaiDateFull(date) {
        const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const time = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} น.`;
        return `วัน${days[date.getDay()]} ที่ ${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear() + 543} เวลา ${time}`;
    }

    function startVipCountdown() {
        const d = parseInt(document.getElementById('vipDays').value) || 0;
        const h = parseInt(document.getElementById('vipHours').value) || 0;
        const exp = new Date();
        exp.setDate(exp.getDate() + d); exp.setHours(exp.getHours() + h);
        localStorage.setItem(`AION_VipExpire_ID_${currentID}`, exp.toISOString());
        updateTimerDisplay(); queueSave();
    }

    function updateTimerDisplay() {
        clearInterval(vipInterval);
        const expStr = localStorage.getItem(`AION_VipExpire_ID_${currentID}`);
        const label = document.getElementById('countdownLabel');
        const expireLabel = document.getElementById('expireDateLabel');
        if (!expStr) { label.innerText = "00 วัน 00:00:00"; expireLabel.innerText = "ยังไม่ได้ตั้งค่าวันหมดอายุ"; return; }
        const exp = new Date(expStr);
        expireLabel.innerText = "หมดอายุ: " + formatThaiDateFull(exp);
        vipInterval = setInterval(() => {
            const diff = exp - new Date();
            if (diff <= 0) { label.innerText = "หมดอายุแล้ว"; label.style.color = "#dc2626"; clearInterval(vipInterval); return; }
            label.style.color = "#10b981";
            const dd = Math.floor(diff / 86400000);
            const hh = Math.floor((diff % 86400000) / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);
            label.innerText = `${dd} วัน ${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
        }, 1000);
    }

    // --- Character Logic (FIXED ENERGY LOGIC) ---
    function addCharRow(data = {}) {
        const body = document.getElementById('charBody');
        const row = body.insertRow();
        
        // คำนวณ Energy ปัจจุบันตามเวลาที่บันทึกไว้ของแต่ละตัวละคร
        const curEne = calculateEneFromSaved(data);
        const rounds = curEne > 0 ? Math.floor(curEne / 80) : "";
        const hasChar = (data.name && data.name.trim() !== "") && (data.job && data.job !== "");

        row.innerHTML = `
            <td><input type="text" class="input-cell c-name" value="${data.name||''}" oninput="updateRowLogic(this)"></td>
            <td><select class="input-cell c-job" onchange="updateRowLogic(this)">
                <option value="">-</option>
                ${CLASSES.map(c => `<option value="${c}" ${data.job===c?'selected':''}>${c}</option>`).join('')}
            </select></td>
            <td><input type="number" class="input-cell c-ene" value="${data.energy||''}" oninput="updateEne(this)"></td>
            <td><input type="text" class="input-cell c-curr readonly-cell" value="${curEne||''}" readonly></td>
            <td><input type="text" class="input-cell c-rounds round-cell" value="${rounds ? rounds + ' รอบ' : ''}" readonly></td>
            <td><select class="input-cell c-buy"></select></td>
            <td><select class="input-cell c-craft"></select></td>
            <td><select class="input-cell c-asc"></select></td>
            <td><select class="input-cell c-raid"></select></td>
            ${extraCols.map((_, idx) => `<td><input type="text" class="input-cell c-extra" value="${(data.extras && data.extras[idx]) ? data.extras[idx] : ""}" oninput="queueSave()"></td>`).join('')}
            <td align="center"><button class="btn-del-tiny" onclick="this.parentElement.parentElement.remove(); queueSave();">×</button></td>
        `;
        // เก็บเวลาที่กรอก Energy ล่าสุดไว้ใน row (hidden)
        row.dataset.lastUpdate = data.lastUpdate || new Date().toISOString();
        applyStatusLogic(row, hasChar, data);
    }

    function updateEne(el) { 
        const row = el.parentElement.parentElement;
        const inputVal = parseInt(el.value) || 0;
        
        // เมื่อมีการกรอกใหม่ ให้ Reset เวลา "บันทึกข้อมูลล่าสุด" ของตัวละครนี้เป็น "ตอนนี้"
        const now = new Date().toISOString();
        row.dataset.lastUpdate = now;

        // ในวินาทีที่กรอก Energy ปัจจุบันจะเท่ากับ Energy คงเหลือเสมอ (โบนัสยังไม่เกิด)
        row.querySelector('.c-curr').value = inputVal || "";
        const rounds = inputVal > 0 ? Math.floor(inputVal / 80) : 0;
        row.querySelector('.c-rounds').value = rounds > 0 ? rounds + " รอบ" : "";
        
        queueSave(); 
    }

    function calculateEneFromSaved(data) {
        if (!data.energy || !data.lastUpdate) return data.energy || 0;
        
        const lastDate = new Date(data.lastUpdate);
        const now = new Date();
        let bonus = 0;
        let check = new Date(lastDate);
        check.setMinutes(0,0,0); 

        // คำนวณโบนัสเฉพาะช่วงเวลาที่ผ่านไปหลังจากบันทึกล่าสุด
        while(check < now) {
            check.setHours(check.getHours() + 1);
            if(check > now) break;
            if(MILESTONES.includes(check.getHours())) bonus += 15;
        }
        return parseInt(data.energy) + bonus;
    }

    function applyStatusLogic(row, hasChar, data = {}) {
        const selectors = [
            { el: row.querySelector('.c-buy'), val: data.buyStatus || "ยังไม่ซื้อ", opt: ["ยังไม่ซื้อ", "ซื้อแล้ว"] },
            { el: row.querySelector('.c-craft'), val: data.craftStatus || "ยังไม่คราฟ", opt: ["ยังไม่คราฟ", "คราฟแล้ว"] },
            { el: row.querySelector('.c-asc'), val: data.ascStatus || "ยังไม่ลง", opt: ["ยังไม่ลง", "ลงแล้ว"] },
            { el: row.querySelector('.c-raid'), val: data.raidStatus || "ยังไม่ลง", opt: ["ยังไม่ลง", "ลงแล้ว"] }
        ];
        selectors.forEach(s => {
            if (!hasChar) { s.el.innerHTML = `<option value="">-</option>`; s.el.className = "input-cell status-off"; s.el.disabled = true; }
            else {
                s.el.disabled = false;
                const currentVal = (s.el.value && s.el.value !== "-" && s.el.value !== "") ? s.el.value : s.val;
                s.el.innerHTML = s.opt.map(o => `<option value="${o}" ${currentVal === o ? 'selected' : ''}>${o}</option>`).join('');
                updateColor(s.el);
                s.el.onchange = function() { updateColor(this); queueSave(); };
            }
        });
    }

    function updateColor(el) {
        if (el.value.includes("แล้ว")) el.className = "input-cell status-done";
        else if (el.value.includes("ยังไม่")) el.className = "input-cell status-not";
        else el.className = "input-cell status-off";
    }

    function updateRowLogic(el) {
        const row = el.closest('tr');
        const hasChar = (row.querySelector('.c-name').value.trim() !== "" && row.querySelector('.c-job').value !== "");
        applyStatusLogic(row, hasChar); queueSave();
    }

    function saveToStorage() {
        const chars = Array.from(document.querySelectorAll('#charBody tr')).map(r => ({
            name: r.querySelector('.c-name').value, job: r.querySelector('.c-job').value, 
            energy: r.querySelector('.c-ene').value, 
            lastUpdate: r.dataset.lastUpdate, // เก็บเวลาแยกรายตัวละคร
            buyStatus: r.querySelector('.c-buy').value, craftStatus: r.querySelector('.c-craft').value, 
            ascStatus: r.querySelector('.c-asc').value, raidStatus: r.querySelector('.c-raid').value, 
            extras: Array.from(r.querySelectorAll('.c-extra')).map(ex => ex.value)
        }));
        localStorage.setItem(`AION_Chars_ID_${currentID}`, JSON.stringify(chars));
        localStorage.setItem(`AION_Note_ID_${currentID}`, document.getElementById('idNote').value);
        localStorage.setItem(`AION_Money_ID_${currentID}`, document.getElementById('moneyM').value);
        localStorage.setItem(`AION_ExtraCols_ID_${currentID}`, JSON.stringify(extraCols));
        document.getElementById('saveText').innerText = "✓ บันทึกแล้ว";
        setTimeout(() => document.getElementById('saveText').innerText = "", 1000);
    }

    function loadFromStorage() {
        document.getElementById('idLabel').innerText = currentID;
        document.getElementById('pageText').innerText = `หน้า ${currentID}`;
        document.getElementById('idNote').value = localStorage.getItem(`AION_Note_ID_${currentID}`) || "";
        document.getElementById('moneyM').value = localStorage.getItem(`AION_Money_ID_${currentID}`) || "";
        extraCols = JSON.parse(localStorage.getItem(`AION_ExtraCols_ID_${currentID}`)) || [];
        document.getElementById('charBody').innerHTML = "";
        const saved = JSON.parse(localStorage.getItem(`AION_Chars_ID_${currentID}`)) || [];
        if (saved.length > 0) saved.forEach(d => addCharRow(d)); else { for(let i=0; i<4; i++) addCharRow(); }
        updateTimerDisplay();
    }

    function changeID(s) { currentID += s; if(currentID < 1) currentID = 1; loadFromStorage(); }
    let saveTimeout; function queueSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToStorage, 800); }
    function changeTab(view) { document.getElementById('charView').classList.toggle('active', view === 'char'); document.getElementById('tabChar').classList.toggle('active', view === 'char'); }
    
    window.onload = () => { 
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH'), 1000); 
        loadFromStorage(); 
    };
</script>
</body>
</html>
