<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION 2 Tracker - Fixed Headers & Columns</title>
    <style>
        :root { --primary: #1a73e8; --success: #16a34a; --danger: #dc2626; --gold: #f59e0b; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .container { background: white; width: 100%; max-width: 1200px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .money-display { background: linear-gradient(135deg, #fffbeb, #fef3c7); padding: 15px; border-radius: 10px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .money-input { border: none; background: transparent; font-size: 32px; font-weight: bold; color: #d97706; width: 160px; text-align: center; outline: none; border-bottom: 2px dashed #f59e0b; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: #e5e7eb; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; }
        th { background: #f1f3f4; padding: 10px 2px; border: 1px solid #ddd; font-size: 12px; text-align: center; position: relative; }
        td { border: 1px solid #ddd; padding: 0; }
        
        /* Column Widths - ปรับให้สมดุล */
        .col-name { width: 15%; }
        .col-job { width: 12%; }
        .col-ene-input { width: 18%; }
        .col-ene-curr { width: 14%; }
        .col-buy { width: 13%; }
        .col-extra { width: 12%; }
        .col-del { width: 35px; }
        
        .input-cell { width: 100%; padding: 10px 5px; border: none; outline: none; box-sizing: border-box; background: transparent; font-size: 13px; text-align: center; }
        .readonly-cell { background: #f0f4ff; color: #1a73e8; font-weight: bold; }
        .sum-cell { background: #eef2ff; color: #4338ca; font-weight: bold; }
        .buy-done { color: var(--success); font-weight: bold; }
        .buy-not { color: var(--danger); }

        .btn-edit-head { position: absolute; left: 1px; top: 1px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 8px; opacity: 0.5; }
        .section-title { font-size: 18px; font-weight: bold; color: var(--primary); margin: 15px 0 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; }
        .btn-blue { background: var(--primary); }
        .btn-add { background: var(--success); }
        .btn-del-tiny { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; border-radius: 4px; cursor: pointer; font-size: 9px; padding: 2px 5px; font-weight: bold; }
        
        .status { text-align: center; color: var(--success); font-size: 12px; height: 18px; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        .vip-timer-display { background: #111827; color: #10b981; padding: 10px; border-radius: 8px; text-align: center; margin-top: 5px; }
        .timer-val { font-family: monospace; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 20px; font-weight: bold; color: var(--primary);">ID: <span id="idLabel">1</span> <input type="text" id="idNote" style="border:none; border-bottom:1px solid #ccc; font-size:16px; width:150px; outline:none;" placeholder="ชื่อโน้ต..." oninput="queueSave()"></div>
        <div id="clock" style="font-family: monospace; color: #666; font-size: 16px;"></div>
    </div>

    <div class="money-display">
        <div style="font-weight:bold; color:#b45309">เงิน M:</div>
        <input type="number" id="moneyM" class="money-input" placeholder="0" oninput="queueSave()">
        <div style="font-weight:bold; color:#b45309">M</div>
    </div>

    <div class="tab-bar">
        <button id="tabChar" class="tab active" onclick="changeTab('char')">👥 ตัวละคร</button>
        <button id="tabItem" class="tab" onclick="changeTab('item')">🎒 คลังไอเทม</button>
    </div>

    <div id="charView" class="content active">
        <div class="vip-card" style="background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 15px;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                <span>VIP เหลือ:</span>
                <input type="number" id="vipDays" placeholder="วัน" style="width:50px; text-align:center;" oninput="startVipCountdown()"> <span>วัน</span>
                <input type="number" id="vipHours" placeholder="ชม." style="width:50px; text-align:center;" oninput="startVipCountdown()"> <span>ชม.</span>
            </div>
            <div class="vip-timer-display">
                <div class="timer-val" id="countdownLabel">00 วัน 00:00:00</div>
                <div id="expireDateLabel" style="font-size:11px; color:#fbbf24;"></div>
            </div>
        </div>

        <div class="section-title">
            <span>📋 รายการตัวละคร</span>
            <button class="btn btn-blue" onclick="addNewColumn()" style="font-size:11px;">+ เพิ่มช่องพิเศษ</button>
        </div>
        <div class="table-wrapper">
            <table id="charTable">
                <thead id="charHead"></thead>
                <tbody id="charBody"></tbody>
            </table>
        </div>
        <button class="btn btn-add" onclick="addCharRow()">+ เพิ่มตัวละคร</button>
    </div>

    <div id="itemView" class="content">
        <div class="section-title"><span>🎒 คลังไอเทม</span></div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:30%">ชื่อไอเทม</th>
                        <th style="width:20%">เทรดได้</th>
                        <th style="width:20%">เทรดไม่ได้</th>
                        <th style="width:20%">จำนวนรวม</th>
                        <th style="width:35px"></th>
                    </tr>
                </thead>
                <tbody id="itemBody"></tbody>
            </table>
        </div>
        <button class="btn btn-add" onclick="addItemRow()">+ เพิ่มไอเทม</button>
    </div>

    <div id="saveText" class="status"></div>
    <div style="text-align:center; margin-top:15px;">
        <button class="btn btn-blue" onclick="changeID(-1)">←</button>
        <span id="pageText" style="margin:0 15px; font-weight:bold;">หน้า 1</span>
        <button class="btn btn-blue" onclick="changeID(1)">→</button>
    </div>
</div>

<script>
    let currentID = 1;
    const CLASSES = ["Ranger", "Gladiator", "Templar", "Assassin", "Sorcerer", "Spiritmaster", "Cleric", "Chanter"];
    const MILESTONES = [1, 4, 7, 10, 13, 16, 19, 22];
    const DEFAULT_ITEMS = ["เขาเล็ก", "เขากลาง", "เขาใหญ่", "เขาแดง", "โอไดล์ทอง", "หินเหลือง", "Amp แดง", "Amp ทอง"];
    
    // บังคับชุดหัวข้อมาตรฐาน
    const FIXED_HEADERS = ["ชื่อตัวละคร", "อาชีพ", "Energy คงเหลือ (กรอก)", "Energy ปัจจุบัน", "ซื้อ Energy"];
    let extraCols = [];
    let vipInterval;

    function changeTab(view) {
        document.getElementById('charView').classList.toggle('active', view === 'char');
        document.getElementById('itemView').classList.toggle('active', view === 'item');
        document.getElementById('tabChar').classList.toggle('active', view === 'char');
        document.getElementById('tabItem').classList.toggle('active', view === 'item');
    }

    function renderHeaders() {
        const thead = document.getElementById('charHead');
        let html = `<tr>`;
        FIXED_HEADERS.forEach((h, i) => {
            let cls = (i === 0) ? 'col-name' : (i === 1 ? 'col-job' : (i===2 ? 'col-ene-input' : (i===3 ? 'col-ene-curr' : 'col-buy')));
            html += `<th class="${cls}">${h}</th>`;
        });
        extraCols.forEach((h, i) => {
            html += `<th class="col-extra">${h} <span style="color:red; cursor:pointer;" onclick="deleteExtraCol(${i})">×</span></th>`;
        });
        html += `<th class="col-del"></th></tr>`;
        thead.innerHTML = html;
    }

    function addCharRow(data = {}) {
        const body = document.getElementById('charBody');
        const row = body.insertRow();
        let options = CLASSES.map(c => `<option value="${c}" ${data.job===c?'selected':''}>${c}</option>`).join('');
        let bonus = calculateBonus();
        let curEne = (data.energy > 0) ? (parseInt(data.energy) + bonus) : "";

        const buyVal = data.buyStatus || "";
        const buyOptions = `
            <option value="" ${buyVal===''?'selected':''}>-</option>
            <option value="ซื้อแล้ว" class="buy-done" ${buyVal==='ซื้อแล้ว'?'selected':''}>ซื้อแล้ว</option>
            <option value="ยังไม่ซื้อ" class="buy-not" ${buyVal==='ยังไม่ซื้อ'?'selected':''}>ยังไม่ซื้อ</option>
        `;

        let html = `
            <td><input type="text" class="input-cell c-name" value="${data.name||''}" oninput="queueSave()"></td>
            <td><select class="input-cell c-job" onchange="queueSave()"><option value="">-</option>${options}</select></td>
            <td><input type="number" class="input-cell c-ene" value="${data.energy||''}" oninput="updateEne(this)"></td>
            <td><input type="text" class="input-cell c-curr readonly-cell" value="${curEne}" readonly></td>
            <td><select class="input-cell c-buy ${buyVal==='ซื้อแล้ว'?'buy-done':(buyVal==='ยังไม่ซื้อ'?'buy-not':'')}" onchange="this.className='input-cell c-buy '+(this.value==='ซื้อแล้ว'?'buy-done':(this.value==='ยังไม่ซื้อ'?'buy-not':'')); queueSave();">${buyOptions}</select></td>
        `;
        extraCols.forEach((_, idx) => {
            let val = (data.extras && data.extras[idx]) ? data.extras[idx] : "";
            html += `<td><input type="text" class="input-cell c-extra" value="${val}" oninput="queueSave()"></td>`;
        });
        html += `<td align="center"><button class="btn-del-tiny" onclick="this.parentElement.parentElement.remove(); queueSave();">×</button></td>`;
        row.innerHTML = html;
    }

    function loadFromStorage() {
        document.getElementById('idLabel').innerText = currentID;
        document.getElementById('pageText').innerText = `หน้า ${currentID}`;
        document.getElementById('idNote').value = localStorage.getItem(`AION_Note_ID_${currentID}`) || "";
        document.getElementById('moneyM').value = localStorage.getItem(`AION_Money_ID_${currentID}`) || "";
        
        // โหลดเฉพาะ Extra Column เท่านั้น ส่วนหัวหลักเราบังคับใช้ตัวแปร FIXED_HEADERS
        extraCols = JSON.parse(localStorage.getItem(`AION_ExtraCols_ID_${currentID}`)) || [];
        
        renderHeaders();
        document.getElementById('charBody').innerHTML = "";
        const saved = JSON.parse(localStorage.getItem(`AION_Chars_ID_${currentID}`)) || [];
        if (saved.length > 0) saved.forEach(d => addCharRow(d)); else { for(let i=0; i<4; i++) addCharRow(); }
        loadItems(); updateTimerDisplay();
    }

    function saveToStorage() {
        const chars = Array.from(document.querySelectorAll('#charBody tr')).map(r => ({
            name: r.querySelector('.c-name').value, 
            job: r.querySelector('.c-job').value, 
            energy: r.querySelector('.c-ene').value,
            buyStatus: r.querySelector('.c-buy').value,
            extras: Array.from(r.querySelectorAll('.c-extra')).map(ex => ex.value)
        }));
        const items = Array.from(document.querySelectorAll('#itemBody tr')).map(r => ({
            name: r.querySelector('.i-name').value, t1: r.querySelector('.i-t1').value, t2: r.querySelector('.i-t2').value
        }));
        localStorage.setItem(`AION_ExtraCols_ID_${currentID}`, JSON.stringify(extraCols));
        localStorage.setItem(`AION_Chars_ID_${currentID}`, JSON.stringify(chars));
        localStorage.setItem(`AION_Items_ID_${currentID}`, JSON.stringify(items));
        localStorage.setItem(`AION_Note_ID_${currentID}`, document.getElementById('idNote').value);
        localStorage.setItem(`AION_Money_ID_${currentID}`, document.getElementById('moneyM').value);
        localStorage.setItem(`AION_LastUpdate_ID_${currentID}`, new Date().toISOString());
        document.getElementById('saveText').innerText = "✓ เซฟ";
        setTimeout(() => document.getElementById('saveText').innerText = "", 1000);
    }

    // --- ส่วนงานอื่นๆ ---
    function loadItems() {
        const body = document.getElementById('itemBody'); body.innerHTML = "";
        const saved = JSON.parse(localStorage.getItem(`AION_Items_ID_${currentID}`)) || [];
        const list = saved.length > 0 ? saved : DEFAULT_ITEMS.map(n => ({name:n, t1:"", t2:""}));
        list.forEach(i => addItemRow(i.name, i.t1, i.t2));
    }
    function addItemRow(n="", t1="", t2="") {
        const body = document.getElementById('itemBody'); const row = body.insertRow();
        const sum = (parseFloat(t1)||0) + (parseFloat(t2)||0);
        row.innerHTML = `<td><input type="text" class="input-cell i-name" value="${n}" oninput="queueSave()"></td>
            <td><input type="number" class="input-cell i-t1" value="${t1}" oninput="updateSum(this)"></td>
            <td><input type="number" class="input-cell i-t2" value="${t2}" oninput="updateSum(this)"></td>
            <td><input type="text" class="input-cell i-sum sum-cell" value="${sum||''}" readonly></td>
            <td align="center"><button class="btn-del-tiny" onclick="this.parentElement.parentElement.remove(); queueSave();">×</button></td>`;
    }
    function updateSum(el) { const row = el.parentElement.parentElement; const v1 = parseFloat(row.querySelector('.i-t1').value) || 0; const v2 = parseFloat(row.querySelector('.i-t2').value) || 0; row.querySelector('.i-sum').value = (v1 + v2 === 0) ? "" : (v1 + v2); queueSave(); }
    function updateEne(el) { el.parentElement.parentElement.querySelector('.c-curr').value = (el.value > 0) ? (parseInt(el.value) + calculateBonus()) : ""; queueSave(); }
    function addNewColumn() { const n = prompt("ชื่อช่องพิเศษ:"); if(n) { extraCols.push(n); saveToStorage(); loadFromStorage(); } }
    function deleteExtraCol(i) { if(confirm("ลบคอลัมน์?")) { extraCols.splice(i, 1); saveToStorage(); loadFromStorage(); } }
    function calculateBonus() { const last = localStorage.getItem(`AION_LastUpdate_ID_${currentID}`); if(!last) return 0; let bonus = 0; let check = new Date(last); check.setMinutes(0,0,0); let now = new Date(); while(check < now) { check.setHours(check.getHours()+1); if(check > now) break; if(MILESTONES.includes(check.getHours())) bonus += 15; } return bonus; }
    function changeID(s) { currentID += s; if(currentID < 1) currentID = 1; loadFromStorage(); }
    let saveTimeout; function queueSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToStorage, 800); }
    function startVipCountdown() { const d = parseInt(document.getElementById('vipDays').value)||0, h = parseInt(document.getElementById('vipHours').value)||0; const exp = new Date(); exp.setDate(exp.getDate()+d); exp.setHours(exp.getHours()+h); localStorage.setItem(`AION_VipExpire_ID_${currentID}`, exp.toISOString()); updateTimerDisplay(); saveToStorage(); }
    function updateTimerDisplay() { clearInterval(vipInterval); const expStr = localStorage.getItem(`AION_VipExpire_ID_${currentID}`); if(!expStr) return; const exp = new Date(expStr); document.getElementById('expireDateLabel').innerText = "หมดอายุ: " + exp.toLocaleString('th-TH'); vipInterval = setInterval(() => { const diff = exp - new Date(); if(diff<=0) { document.getElementById('countdownLabel').innerText="หมดอายุแล้ว"; return; } const dd = Math.floor(diff/86400000), hh = Math.floor((diff%86400000)/3600000), mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000); document.getElementById('countdownLabel').innerText = `${dd} วัน ${hh}:${mm}:${ss}`; }, 1000); }
    window.onload = () => { setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH'), 1000); loadFromStorage(); };
</script>
</body>
</html>
