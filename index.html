<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION 2 Tracker - Official Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981; --danger: #ef4444; --gold: #fbbf24; --gold-glow: rgba(251, 191, 36, 0.4);
            --dark-bg: #0f172a; --dark-card: #1e293b; --border: #334155;
            --text-main: #f8fafc; --text-dim: #94a3b8; --font-main: 'Prompt', sans-serif;
            --fs-table: 15px; --fs-header: 12px;
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { font-family: var(--font-main); background: var(--dark-bg); color: var(--text-main); display: flex; justify-content: center; padding: 15px; font-size: 16px; margin: 0; }
        .container { background: var(--dark-card); width: 100%; max-width: 1750px; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid var(--border); min-height: 90vh; display: flex; flex-direction: column; }
        
        .global-summary-bar { background: #0f172a; padding: 15px 20px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .global-total-amount { font-size: 24px; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--gold-glow); }

        .id-tabs-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid #111827; padding-bottom: 15px; }
        .id-tab { padding: 10px 18px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; color: var(--text-dim); cursor: pointer; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 10px; min-width: 140px; justify-content: space-between; }
        .id-tab.active { background: linear-gradient(135deg, var(--primary), #1d4ed8); color: white; border-color: transparent; box-shadow: 0 4px 15px var(--primary-glow); font-weight: 600; }
        
        .table-wrapper { width: 100%; overflow: hidden; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; background: #111827; }
        th { background: #1f2937; padding: 10px 5px; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); color: var(--gold); text-align: center; font-size: var(--fs-header); }
        td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0; height: 50px; vertical-align: middle; }
        
        .input-cell { width: 100%; height: 100%; border: none; outline: none; background: transparent; font-size: var(--fs-table); text-align: center; color: var(--text-main); font-family: 'Prompt'; }
        select.input-cell { text-align-last: center; }
        .readonly-cell { background: rgba(59, 130, 246, 0.05); color: #60a5fa; font-weight: 600; }
        .result-cell { background: rgba(251, 146, 60, 0.05); color: #fb923c; font-weight: bold; font-size: 18px; }

        .check-container { display: flex; justify-content: center; align-items: center; height: 100%; cursor: pointer; }
        .check-container input { display: none; }
        .check-mark::after { content: "✘"; color: var(--danger); font-size: 16px; opacity: 0.2; }
        .checked .check-mark::after { content: "✔"; color: var(--success); font-size: 18px; opacity: 1; font-weight: bold; }

        .timer-box { background: #000; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #1f2937; position: relative; display: flex; flex-direction: column; justify-content: center; min-height: 120px;}
        .timer-label { font-size: 24px; font-weight: bold; color: #10b981; }

        .btn-add { background: var(--success); color: white; padding: 8px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        #saveStatus { position: fixed; bottom: 20px; right: 20px; padding: 12px 25px; background: var(--primary); color: white; border-radius: 12px; display: none; z-index: 1000; }
        
        .tabs-container { display: flex; background: #111827; padding: 5px; border-radius: 12px; margin-bottom: 20px; width: fit-content; border: 1px solid var(--border); }
        .tab-btn { padding: 8px 20px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; border-radius: 8px; }
        .tab-btn.active { background: #334155; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="global-summary-bar">
        <span id="currentUserLabel" style="color:var(--gold); font-weight:bold;">👤 User: Loading...</span>
        <div class="global-total-amount">💰 Kinah รวม: <span id="globalKinahTotal">0</span></div>
    </div>

    <div class="id-tabs-wrapper" id="idTabsList"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="font-size: 20px; font-weight:bold; color:var(--primary);">💎 ID: <span id="idLabel">1</span></div>
            <input type="text" id="idNote" placeholder="ชื่อไอดี..." oninput="updateIDTabName(this.value); queueSave();" style="border:none; border-bottom:2px solid var(--border); background:transparent; color:var(--gold); width: 300px; padding: 5px;">
        </div>
        <div id="clock" style="font-family:monospace; font-size:18px; color:var(--text-dim);"></div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" id="btn-char" onclick="switchTab('char')">👤 จัดการตัวละคร</button>
        <button class="tab-btn" id="btn-item" onclick="switchTab('item')">📦 คลังเก็บไอเทม</button>
    </div>

    <div id="charPage">
        <div style="display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 15px; margin-bottom: 15px;">
            <div style="background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px;">
                <div style="color:var(--gold); font-size:14px;">Kinah ในไอดี:</div>
                <input type="text" id="moneyKinah" class="input-cell" style="font-size:32px; font-weight:700; color:var(--gold); width:250px; text-align:right;" oninput="formatKinah(this); queueSave();">
            </div>
            <div style="background: #111827; padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center;">
                <div style="color:var(--text-dim); font-size:12px;">⚔️ ดันเจี้ยนรวม</div>
                <div style="font-size:32px; font-weight:bold; color:var(--primary);"><span id="totalRunsDisplay">0</span> รอบ</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div class="timer-box">
                <div style="position:absolute; top:8px; right:12px; display:flex; align-items:center; gap:5px; font-size:11px;">
                    VIP <input type="checkbox" id="pageVipToggle" onchange="togglePageVip()">
                </div>
                <div id="countdownLabel" class="timer-label">00 วัน 00:00:00</div>
                <div id="expireFullDate" style="font-size:12px; color:#60a5fa;">หมดอายุ: --</div>
                <div style="margin-top:5px; font-size:12px;">
                    <input type="number" id="vipDays" style="width:30px; background:#111827; color:white; border:1px solid #334155;"> วัน
                    <button onclick="calcVipExpire()" style="font-size:10px;">ตั้งค่า</button>
                </div>
            </div>
            <div class="timer-box">
                <div id="energyNextTimer" class="timer-label" style="color:#fb923c;">00:00:00</div>
                <div style="font-size:12px; color:var(--text-dim);">รอบเติมถัดไป (Energy +<span id="energyValueText">10</span> / Reward +1)</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:11%">ชื่อตัวละคร</th><th style="width:10%">อาชีพ</th>
                        <th style="width:14%">Energy (ปกติ + โบนัส)</th><th style="width:8%">รวม</th>
                        <th style="width:8%">Boss</th><th style="width:8%">Reward</th><th style="width:8%">ลงจริง</th>
                        <th style="width:6%">Buy</th><th style="width:6%">Craft</th><th style="width:6%">Asc</th><th style="width:6%">Raid</th>
                        <th style="width:40px"></th>
                    </tr>
                </thead>
                <tbody id="charBody"></tbody>
            </table>
        </div>
        <button class="btn-add" onclick="addCharRow()">+ เพิ่มตัวละคร</button>
    </div>

    <div id="itemPage" class="hidden">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th style="width:40%">ชื่อไอเทม</th><th style="width:20%">เทรดได้</th><th style="width:20%">เทรดไม่ได้</th><th style="width:20%">รวมทั้งหมด</th><th style="width:45px"></th></tr>
                </thead>
                <tbody id="itemBody"></tbody>
            </table>
        </div>
        <button class="btn-add" onclick="addItemRow()">+ เพิ่มไอเทม</button>
    </div>
</div>

<div id="saveStatus">✓ บันทึกแล้ว</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAAEYitAhzkIopt6VUTX79SCkRgsorhvgk",
      authDomain: "aion-2-25473.firebaseapp.com",
      databaseURL: "https://aion-2-25473-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aion-2-25473",
      appId: "1:730363632991:web:6410eca836d89a8630eaea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const userName = urlParams.get('user') || 'default';
    document.getElementById('currentUserLabel').innerText = `👤 User: ${userName}`;

    let currentID = 1, idList = [1], idNames = {}, vipInterval;

    // --- ⚡ OFFICIAL REFILL LOGIC (3 HOURS / 8 HOURS) ---

    async function checkAutoRefill(data) {
        if (!data || !data.lastUpdate) return false;
        
        const lastUpdate = new Date(data.lastUpdate);
        const now = new Date();
        const diffMinutes = Math.floor((now - lastUpdate) / 60000);
        let hasChanged = false;

        // Energy: ทุก 180 นาที (3 ชม.)
        const energyIntervals = Math.floor(diffMinutes / 180);
        // Reward: ทุก 480 นาที (8 ชม.)
        const rewardIntervals = Math.floor(diffMinutes / 480);

        if (energyIntervals > 0 || rewardIntervals > 0) {
            const addEne = data.isVip ? 15 : 10;
            data.chars.forEach(c => {
                if (c.name) {
                    if (energyIntervals > 0) {
                        let base = parseInt(c.base) || 0;
                        c.base = Math.min(840, base + (addEne * energyIntervals));
                        hasChanged = true;
                    }
                    if (rewardIntervals > 0) {
                        let reward = parseInt(c.reward) || 0;
                        c.reward = Math.min(21, reward + (1 * rewardIntervals));
                        hasChanged = true;
                    }
                }
            });
        }
        return hasChanged ? data : false;
    }

    // --- 💾 DATABASE FUNCTIONS ---

    async function saveToCloud() {
        const chars = Array.from(document.querySelectorAll('#charBody tr')).map(r => ({
            name: r.querySelector('.c-name').value, job: r.querySelector('.c-job').value,
            base: r.querySelector('.c-base').value, bonus: r.querySelector('.c-bonus').value,
            boss: r.querySelector('.c-boss').value, reward: r.querySelector('.c-reward').value,
            buy: r.querySelector('.c-buy').checked, craft: r.querySelector('.c-craft').checked,
            asc: r.querySelector('.c-asc').checked, raid: r.querySelector('.c-raid').checked
        }));
        const items = Array.from(document.querySelectorAll('#itemBody tr')).map(r => ({
            name: r.querySelector('.i-name').value, t1: r.querySelector('.i-t1').value, t2: r.querySelector('.i-t2').value
        }));
        const data = {
            chars, items, note: document.getElementById('idNote').value,
            money: document.getElementById('moneyKinah').value.replace(/,/g, "") || "0",
            isVip: document.getElementById('pageVipToggle').checked,
            lastUpdate: new Date().toISOString()
        };
        await set(ref(db, `users/${userName}/id_${currentID}`), data);
        updateGlobalKinah();
        showStatus("✓ บันทึกอัตโนมัติ");
    }

    async function loadFromCloud() {
        const snapshot = await get(ref(db, `users/${userName}/id_${currentID}`));
        let data = snapshot.val();
        const updated = await checkAutoRefill(data);
        if (updated) { data = updated; await set(ref(db, `users/${userName}/id_${currentID}`), data); }
        renderUI(data);
    }

    function renderUI(data) {
        document.getElementById('idLabel').innerText = currentID;
        document.getElementById('idNote').value = data?.note || "";
        document.getElementById('moneyKinah').value = data?.money ? Number(data.money).toLocaleString() : "";
        document.getElementById('pageVipToggle').checked = data?.isVip || false;
        
        const charBody = document.getElementById('charBody'); charBody.innerHTML = "";
        if (data?.chars) data.chars.forEach(d => addCharRow(d)); else for(let i=0;i<3;i++) addCharRow();

        const itemBody = document.getElementById('itemBody'); itemBody.innerHTML = "";
        if (data?.items) data.items.forEach(d => addItemRow(d));

        updateVipDisplay(); updateTotalRuns(); togglePageVip(false); updateGlobalKinah();
    }

    // --- 🖼️ UI HELPERS ---

    window.addCharRow = function(d = {}) {
        const row = document.getElementById('charBody').insertRow();
        row.innerHTML = `
            <td><input type="text" class="input-cell c-name" value="${d.name||''}" oninput="queueSave()"></td>
            <td><select class="input-cell c-job" onchange="queueSave()">
                <option value="">เลือก</option><option value="Ranger" ${d.job==='Ranger'?'selected':''}>Ranger</option>
                <option value="Gladiator" ${d.job==='Gladiator'?'selected':''}>Gladiator</option><option value="Templar" ${d.job==='Templar'?'selected':''}>Templar</option>
                <option value="Assassin" ${d.job==='Assassin'?'selected':''}>Assassin</option><option value="Sorcerer" ${d.job==='Sorcerer'?'selected':''}>Sorcerer</option>
                <option value="Spiritmaster" ${d.job==='Spiritmaster'?'selected':''}>Spiritmaster</option><option value="Cleric" ${d.job==='Cleric'?'selected':''}>Cleric</option>
                <option value="Chanter" ${d.job==='Chanter'?'selected':''}>Chanter</option>
            </select></td>
            <td><div style="display:flex;justify-content:center;"><input type="number" class="input-cell c-base" style="width:50px" value="${d.base||''}" oninput="updateT(this)">+<input type="number" class="input-cell c-bonus" style="width:50px" value="${d.bonus||''}" oninput="updateT(this)"></div></td>
            <td class="readonly-cell"><span class="c-total">0</span></td>
            <td><input type="number" class="input-cell c-boss" value="${d.boss||''}" oninput="updateT(this)"></td>
            <td><input type="number" class="input-cell c-reward" value="${d.reward||''}" oninput="updateT(this)"></td>
            <td class="result-cell"><span class="c-final">-</span></td>
            <td>${createChk('c-buy', d.buy)}</td><td>${createChk('c-craft', d.craft)}</td>
            <td>${createChk('c-asc', d.asc)}</td><td>${createChk('c-raid', d.raid)}</td>
            <td><button onclick="this.closest('tr').remove(); queueSave();" style="border:none;background:none;color:#444;">×</button></td>
        `;
        updateT(row.querySelector('.c-base'));
    }

    function createChk(cls, val) { return `<label class="check-container ${val?'checked':''}"><input type="checkbox" class="${cls}" ${val?'checked':''} onchange="this.closest('.check-container').classList.toggle('checked', this.checked); queueSave();"><span class="check-mark"></span></label>`; }

    window.updateT = function(el) {
        const r = el.closest('tr'); if(!r) return;
        const base = parseInt(r.querySelector('.c-base').value)||0, bonus = parseInt(r.querySelector('.c-bonus').value)||0;
        const total = base + bonus; r.querySelector('.c-total').innerText = total;
        let runs = Math.floor(total/80), boss = parseInt(r.querySelector('.c-boss').value), rew = parseInt(r.querySelector('.c-reward').value);
        if(!isNaN(boss)) runs = Math.min(runs, boss); if(!isNaN(rew)) runs = Math.min(runs, rew);
        r.querySelector('.c-final').innerText = runs > 0 ? runs + " รอบ" : "-";
        updateTotalRuns(); queueSave();
    }

    window.addItemRow = function(d = {}) {
        const row = document.getElementById('itemBody').insertRow();
        row.innerHTML = `
            <td><input type="text" class="input-cell i-name" value="${d.name||''}" oninput="queueSave()"></td>
            <td><input type="number" class="input-cell i-t1" value="${d.t1||''}" oninput="calcI(this)"></td>
            <td><input type="number" class="input-cell i-t2" value="${d.t2||''}" oninput="calcI(this)"></td>
            <td class="readonly-cell"><span class="i-total">0</span></td>
            <td><button onclick="this.closest('tr').remove(); queueSave();" style="border:none;background:none;color:#444;">×</button></td>
        `;
        calcI(row.querySelector('.i-t1'));
    }
    window.calcI = function(el) { const r = el.closest('tr'); const t = (parseInt(r.querySelector('.i-t1').value)||0)+(parseInt(r.querySelector('.i-t2').value)||0); r.querySelector('.i-total').innerText = t; queueSave(); }

    // --- ⏰ SYSTEMS ---

    window.togglePageVip = function(save = true) {
        document.getElementById('energyValueText').innerText = document.getElementById('pageVipToggle').checked ? "15" : "10";
        if(save) queueSave();
    }
    window.calcVipExpire = function() {
        const d = parseInt(document.getElementById('vipDays').value)||0;
        if(d > 0) { localStorage.setItem(`VIP_${userName}_${currentID}`, Date.now() + (d*86400000)); updateVipDisplay(); queueSave(); }
    }
    function updateVipDisplay() {
        const exp = localStorage.getItem(`VIP_${userName}_${currentID}`); if(vipInterval) clearInterval(vipInterval);
        if(!exp) { document.getElementById('countdownLabel').innerText = "00 วัน 00:00:00"; return; }
        const target = new Date(parseInt(exp));
        document.getElementById('expireFullDate').innerText = "หมดอายุ: " + target.toLocaleString('th-TH', { weekday:'long', day:'numeric', month:'long' });
        vipInterval = setInterval(() => {
            const diff = target - Date.now();
            if(diff <= 0) { document.getElementById('countdownLabel').innerText = "หมดอายุ"; return; }
            const dd = Math.floor(diff/86400000), hh = Math.floor((diff%86400000)/3600000), mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000);
            document.getElementById('countdownLabel').innerText = `${dd} วัน ${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }, 1000);
    }

    window.switchTab = (t) => {
        document.getElementById('charPage').classList.toggle('hidden', t !== 'char');
        document.getElementById('itemPage').classList.toggle('hidden', t !== 'item');
        document.getElementById('btn-char').classList.toggle('active', t === 'char');
        document.getElementById('btn-item').classList.toggle('active', t === 'item');
    }

    // ID Tabs (Simplified for full code)
    async function initTabs() {
        const idListRef = ref(db, `users/${userName}/config/idList`);
        onValue(idListRef, (s) => { idList = s.val() || [1]; renderIDTabs(); loadFromCloud(); });
    }
    function renderIDTabs() {
        document.getElementById('idTabsList').innerHTML = idList.map(id => `<div class="id-tab ${id===currentID?'active':''}" onclick="currentID=${id};renderIDTabs();loadFromCloud();">ID ${id}</div>`).join('') + `<button onclick="idList.push(idList.length+1);set(ref(db, 'users/${userName}/config/idList'), idList);">+</button>`;
    }

    window.formatKinah = (i) => { i.value = i.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
    async function updateGlobalKinah() {
        const snap = await get(ref(db, `users/${userName}`)); let total = 0;
        if(snap.val()) Object.keys(snap.val()).forEach(k => { if(k.startsWith('id_')) total += parseInt(snap.val()[k].money || 0); });
        document.getElementById('globalKinahTotal').innerText = total.toLocaleString();
    }
    function updateTotalRuns() { let t = 0; document.querySelectorAll('.c-final').forEach(i => t += (parseInt(i.innerText)||0)); document.getElementById('totalRunsDisplay').innerText = t; }
    function showStatus(t) { const s = document.getElementById('saveStatus'); s.innerText = t; s.style.display = "block"; setTimeout(()=>s.style.display="none", 2000); }
    let saveTimeout; window.queueSave = () => { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveToCloud, 1000); }

    setInterval(() => {
        const now = new Date(); document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH');
        // แสดงเวลานับถอยหลังรอบถัดไป (จำลองการนับแบบ Real-time)
        const nextHour = 3 - (now.getHours() % 3);
        document.getElementById('energyNextTimer').innerText = `${nextHour} ชม. ${60-now.getMinutes()} นาที`;
    }, 60000);

    window.onload = initTabs;
</script>
</body>
</html>
